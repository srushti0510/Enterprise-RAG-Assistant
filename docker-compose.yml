services:
  backend:
    build: .
    container_name: enterprise-rag-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./feedback.db:/app/feedback.db
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=

  frontend:
    build: .
    container_name: enterprise-rag-frontend
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./feedback.db:/app/feedback.db
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=
    depends_on:
      - backend